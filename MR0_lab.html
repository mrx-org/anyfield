<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR0 Lab - Combined Explorer</title>
    
    <!-- Dependencies for Niivue App -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="niivue_app.css">
    
    <!-- Dependencies for Seq Explorer -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <link rel="stylesheet" href="pypulseq/seq_explorer.css">

    <style>
        :root {
            --bg: #0b1020;
            --border: rgba(255, 255, 255, 0.12);
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: var(--bg);
            color: #e8ecff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        .lab-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        #niivue-slot {
            flex: 1;
            min-height: 400px;
            border-bottom: 2px solid var(--border);
            overflow: auto;
        }
        #explorer-slot {
            flex: 1;
            overflow: auto;
            padding: 12px;
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <div id="loader-text">Initializing MR0 Lab...</div>
    </div>

    <div class="lab-container">
        <div id="niivue-slot"></div>
        <div id="explorer-slot"></div>
    </div>

    <script type="module">
        import { initNiivueApp } from './niivue_app.js';
        import { SequenceExplorer } from './pypulseq/seq_explorer.js';

        async function bootstrap() {
            const loaderText = document.getElementById('loader-text');
            
            try {
                // 1. Initialize Pyodide (shared)
                loaderText.textContent = "Loading Pyodide runtime...";
                const pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.0/full/",
                });
                
                // 2. Load basic packages
                loaderText.textContent = "Installing Python dependencies...";
                await pyodide.loadPackage(['numpy', 'scipy', 'matplotlib', 'micropip']);
                const micropip = pyodide.pyimport("micropip");
                await micropip.install(['pypulseq', 'nibabel']);

                // 3. Initialize Niivue App
                loaderText.textContent = "Starting Niivue viewer...";
                const niivueApp = await initNiivueApp('niivue-slot', { pyodide });

                // 4. Initialize Sequence Explorer
                loaderText.textContent = "Loading Sequence Explorer...";
                const explorer = new SequenceExplorer('explorer-slot', {
                    pyodide,
                    sources: [] // Will load from config
                });

                // Install optimized plot function
                loaderText.textContent = "Optimizing plot functions...";
                await explorer.installOptimizedPlotFunction();
                await explorer.detectVersions();

                // Load default sources
                await explorer.loadDefaultSources();

                // Hide loader
                document.getElementById('loader').classList.add('hidden');
                console.log("MR0 Lab initialized successfully");
                
                // Make modules accessible for debugging
                window.niivueApp = niivueApp;
                window.seqExplorer = explorer;

            } catch (e) {
                console.error("Bootstrap failed:", e);
                loaderText.textContent = "Error during initialization: " + e.message;
                loaderText.style.color = "#ef4444";
            }
        }

        bootstrap();
    </script>
</body>
</html>
